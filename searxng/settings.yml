use_default_settings: true

server:
  secret_key: "leadforge-searxng-dev-key-change-in-production"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false

search:
  safe_search: 0
  formats:
    - html
    - json

# Tier 🥇 — Search scraping engines (SearXNG aggregates Brave, DDG, Wikipedia)
engines:
  - name: brave
    disabled: false
  - name: duckduckgo
    disabled: false
  - name: wikipedia
    disabled: false
  - name: wikidata
    disabled: false
  - name: google
    disabled: true
  - name: startpage
    disabled: true

ui:
  static_use_hash: true
