services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: http://localhost:8080/
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    build: .
    command: npx tsx scripts/scraping-worker.ts
    env_file:
      - .env.local
    environment:
      REDIS_URL: redis://redis:6379
      SEARXNG_URL: http://searxng:8080
    depends_on:
      - redis
      - searxng
    restart: unless-stopped

  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      REDIS_URL: redis://redis:6379
      SEARXNG_URL: http://searxng:8080
    depends_on:
      - redis
      - searxng
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
